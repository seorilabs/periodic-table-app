name: Deploy Apps in Toss

# main 병합 자동 배포 제거(쿼터 보호). 배포는 명시적 Release/Tag(v*.*.*) 또는 수동 dispatch.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      memo:
        description: "앱인토스 배포 메모 (선택, 최대 1000자)"
        required: false
        type: string
      create_release_tag:
        description: "앱인토스 배포 성공 후 릴리즈 태그 생성"
        required: false
        default: true
        type: boolean

concurrency:
  group: apps-in-toss-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy .ait bundle
    runs-on: seorilabs-rpi-arm64
    environment: apps-in-toss

    env:
      APPS_IN_TOSS_API_KEY: ${{ secrets.APPS_IN_TOSS_API_KEY }}
      APPS_IN_TOSS_INPUT_MEMO: ${{ github.event.inputs.memo || '' }}
      CREATE_RELEASE_TAG_INPUT: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.create_release_tag != 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Prepare release tag metadata
        id: release-tag
        run: |
          set -euo pipefail

          create_release_tag="$CREATE_RELEASE_TAG_INPUT"

          if [ "$create_release_tag" = "false" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${GITHUB_RUN_NUMBER:-}" ]; then
            echo "GITHUB_RUN_NUMBER is required to create a sequential release tag." >&2
            exit 1
          fi

          short_sha="${GITHUB_SHA::7}"
          tag="periodic-table-release-$GITHUB_RUN_NUMBER"
          existing_tag_sha="$(git ls-remote --tags origin "refs/tags/$tag^{}" | awk 'NR == 1 { print $1 }')"

          if [ -z "$existing_tag_sha" ]; then
            existing_tag_sha="$(git ls-remote --tags origin "refs/tags/$tag" | awk 'NR == 1 { print $1 }')"
          fi

          if [ "$existing_tag_sha" = "$GITHUB_SHA" ]; then
            echo "Release tag '$tag' already exists for this commit. Skipping tag creation."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$existing_tag_sha" ]; then
            echo "Git tag '$tag' already exists for a different commit ($existing_tag_sha)." >&2
            exit 1
          fi

          {
            echo "enabled=true"
            echo "tag=$tag"
            echo "message=periodic-table AppsInToss deploy #$GITHUB_RUN_NUMBER ($short_sha)"
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Validate Apps in Toss secrets
        run: |
          if [ -z "$APPS_IN_TOSS_API_KEY" ]; then
            echo "APPS_IN_TOSS_API_KEY secret is required." >&2
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck shared core
        run: npm --prefix packages/ait-core run typecheck

      - name: Typecheck
        run: npm run typecheck

      - name: Test shared core
        run: npm --prefix packages/ait-core test

      - name: Test
        run: npm test

      - name: Build .ait bundle
        run: npm run build

      - name: Upload .ait artifact
        uses: actions/upload-artifact@v7
        with:
          name: periodic-table-ait-bundle
          path: "*.ait"
          if-no-files-found: error
          retention-days: 3

      - name: Deploy to Apps in Toss
        run: |
          memo="$APPS_IN_TOSS_INPUT_MEMO"

          if [ -z "$memo" ]; then
            memo="GitHub Actions ${GITHUB_REF_NAME}@${GITHUB_SHA::7}"
          fi

          npm run deploy -- --api-key "$APPS_IN_TOSS_API_KEY" --memo "$memo"

      - name: Create release tag
        if: steps.release-tag.outputs.enabled == 'true'
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
          RELEASE_TAG_MESSAGE: ${{ steps.release-tag.outputs.message }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" "$GITHUB_SHA" -m "$RELEASE_TAG_MESSAGE"
          git push origin "refs/tags/$RELEASE_TAG"
