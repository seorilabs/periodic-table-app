# AIT(.ait) 빌드 + AppsInToss 배포 — ARC. org 재사용 워크플로우 호출.
# dispatch 직접 실행 또는 deploy-all.yml에서 workflow_call.
# 이 repo의 .ait 빌드/배포는 루트에서 수행(ait_dir=".").
name: Deploy AppsInToss

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "배포할 릴리즈 태그. 비우면 호출 ref."
        type: string
        required: false
        default: ""
      memo:
        description: "배포 메모(선택)"
        type: string
        required: false
        default: ""
  workflow_call:
    inputs:
      release_tag:
        type: string
        required: false
        default: ""
      memo:
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  ait:
    uses: seorilabs/.github/.github/workflows/rn-deploy-ait.yml@main
    secrets: inherit
    with:
      release_tag: ${{ inputs.release_tag }}
      memo: ${{ inputs.memo }}
      ait_dir: "."
      package_manager: npm
      install_command: "npm ci"
      build_command: "npm run build"
      artifact_path: "*.ait"
