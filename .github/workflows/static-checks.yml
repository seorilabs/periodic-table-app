# main 정적 품질 게이트 — org 재사용 워크플로우 호출.
# 무거운 빌드/배포 금지(태그/배포는 deploy-*.yml). 설계: seorilabs/.github docs/ci-cd.
# 이 repo는 PUBLIC — public PR은 ARC self-hosted가 아닌 ubuntu-latest로 라우팅.
name: Static Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: seorilabs/.github/.github/workflows/rn-static-checks.yml@main
    secrets: inherit
    with:
      runs_on: ${{ github.event.repository.private && 'seorilabs-rpi-arm64' || 'ubuntu-latest' }}
      package_manager: npm
      install_command: "npm ci"
      check_command: |
        npm run lint
        npm --prefix packages/ait-core run typecheck
        npm run typecheck
        npm --prefix packages/ait-core test
        npm test
