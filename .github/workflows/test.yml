name: Test

on:
  pull_request:
    branches:
      - main
      - develop
      - feature/*
      - hotfix/*
      - release/*
      - bugfix/*
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  checks:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint app
        run: npm run lint

      - name: Typecheck shared core
        run: npm --prefix packages/ait-core run typecheck

      - name: Typecheck app
        run: npm run typecheck

      - name: Test shared core
        run: npm --prefix packages/ait-core test

      - name: Test app
        run: npm test

      - name: Build app
        run: npm run build
